<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Surebet Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ui-controls">
        <button id="reset-btn" class="icon-btn" title="Reiniciar todo">
            <i class="fas fa-rotate-left"></i>
        </button>
        <label class="theme-toggle" title="Modo oscuro">
            <input type="checkbox" id="theme-toggle" />
            <span class="toggle-track">
                <i class="fas fa-sun"></i>
                <i class="fas fa-moon"></i>
            </span>
        </label>
    </div>

    <div class="container">
        <div class="page-toolbar">
            <h2 class="page-title"><i class="fas fa-calculator"></i> Mis calculadoras</h2>
            <button type="button" id="btn-agregar-calculadora" class="btn-agregar-calculadora">
                <i class="fas fa-plus"></i> Agregar calculadora
            </button>
        </div>

        <div class="resumen-global summary-card summary-card-compact">
            <div class="resumen-global-titulo"><i class="fas fa-layer-group"></i> Total general</div>
            <div class="summary-grid-surebet">
                <div class="summary-item">
                    <div class="summary-icon"><i class="fas fa-coins"></i></div>
                    <div class="summary-content">
                        <span class="summary-label">Inversión Total</span>
                        <span class="summary-value" id="total-inversion-global">S/0.00</span>
                    </div>
                </div>
                <div class="summary-item">
                    <div class="summary-icon"><i class="fas fa-shield-halved"></i></div>
                    <div class="summary-content">
                        <span class="summary-label">Retorno Bruto Total</span>
                        <span class="summary-value" id="total-retorno-global">S/0.00</span>
                    </div>
                </div>
                <div class="summary-item">
                    <div class="summary-icon"><i class="fas fa-scale-balanced"></i></div>
                    <div class="summary-content">
                        <span class="summary-label">Pérdida/Ganancia Total</span>
                        <span class="summary-value" id="total-beneficio-global">S/0.00</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="calculadoras-container" class="calculadoras-container"></div>
    </div>

    <template id="calculadora-template">
        <div class="calculator-section calculator-instance">
            <div class="calculator-card">
                <div class="header">
                    <div class="header-icon">
                        <i class="fas fa-calculator"></i>
                    </div>
                    <div class="header-content">
                        <h1 class="calculadora-titulo">Calculadora Surebet</h1>
                    </div>
                    <button type="button" class="btn-eliminar-calculadora" title="Eliminar calculadora">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="calculator-content calculator-content-horizontal">
                    <div class="surebet-controls-row">
                        <div class="perdida-fija-section perdida-fija-inline">
                            <label class="perdida-fija-label">
                                <i class="fas fa-chart-line"></i>
                                Pérdida fija
                            </label>
                            <input type="number" class="modern-input perdida-fija-input perdida-fija" value="-10" step="0.01" placeholder="-10">
                        </div>
                        <div class="resultado-toggle">
                            <span class="resultado-toggle-label">Resultado</span>
                            <div class="resultado-toggle-btns">
                                <button type="button" class="btn-resultado btn-ganado active" data-resultado="ganado">
                                    <i class="fas fa-check"></i> Ganado
                                </button>
                                <button type="button" class="btn-resultado btn-perdido" data-resultado="perdido">
                                    <i class="fas fa-times"></i> Perdido
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="surebet-error" hidden></div>

                    <div class="table-container">
                        <table class="modern-table">
                            <thead>
                                <tr>
                                    <th class="resultado-header th-equipo"><i class="fas fa-users"></i> Equipo</th>
                                    <th class="th-cuota"><i class="fas fa-chart-line"></i> Cuota</th>
                                    <th class="th-apuesta"><i class="fas fa-dollar-sign"></i> Apuesta</th>
                                    <th class="th-beneficio"><i class="fas fa-trophy"></i> Beneficio</th>
                                </tr>
                            </thead>
                            <tbody class="filas-tbody"></tbody>
                        </table>
                    </div>

                    <div class="summary-card summary-card-compact">
                        <div class="summary-grid-surebet">
                            <div class="summary-item">
                                <div class="summary-icon"><i class="fas fa-coins"></i></div>
                                <div class="summary-content">
                                    <span class="summary-label">Inversión Total</span>
                                    <span class="summary-value apuesta-total">S/0.00</span>
                                </div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-icon"><i class="fas fa-shield-halved"></i></div>
                                <div class="summary-content">
                                    <span class="summary-label">Retorno Bruto</span>
                                    <span class="summary-value retorno-objetivo">S/0.00</span>
                                </div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-icon"><i class="fas fa-scale-balanced"></i></div>
                                <div class="summary-content">
                                    <span class="summary-label">Ganancia Real</span>
                                    <span class="summary-value beneficio-real">S/0.00</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
